name: CI/CD Pipeline

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

env:
  NODE_VERSION: '18'
  POSTGRES_VERSION: '13'

jobs:
  # Frontend Testing
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: MuseBar/package-lock.json

    - name: Install frontend dependencies
      working-directory: MuseBar
      run: npm ci

    - name: Run frontend linting
      working-directory: MuseBar
      run: npm run lint

    - name: Run frontend type checking
      working-directory: MuseBar
      run: npm run type-check

    - name: Run frontend tests
      working-directory: MuseBar
      run: npm run test:ci

    - name: Upload frontend test coverage
      uses: codecov/codecov-action@v4
      with:
        file: MuseBar/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Backend Testing
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mosehxl_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: MuseBar/backend/package-lock.json

    - name: Install backend dependencies
      working-directory: MuseBar/backend
      run: npm ci --workspaces=false --include-workspace-root=false

    - name: Enforce schema drift policy
      working-directory: MuseBar/backend
      env:
        GIT_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        GIT_HEAD: ${{ github.sha }}
      run: npm run check:schema-drift

    - name: Run backend linting
      working-directory: MuseBar/backend
      run: npm run lint

    - name: Run backend type checking
      working-directory: MuseBar/backend
      run: npm run type-check

    - name: Run database migrations
      working-directory: MuseBar/backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: mosehxl_test
      run: npm run migration:migrate

    - name: Run backend tests
      working-directory: MuseBar/backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: mosehxl_test
      run: npm test

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run npm audit
      working-directory: MuseBar
      run: npm audit --audit-level=high

    - name: Run npm audit (backend)
      working-directory: MuseBar/backend
      run: npm audit --audit-level=high

  # Build and Deploy (only on main branch)
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Build frontend
      working-directory: MuseBar
      run: |
        npm ci
        npm run build

    - name: Build backend
      working-directory: MuseBar/backend
      run: |
        npm ci --workspaces=false --include-workspace-root=false
        npm run build

    - name: Create deployment package
      run: |
        mkdir -p deployment
        cp -r MuseBar/build/* deployment/frontend/
        cp -r MuseBar/backend/dist/* deployment/backend/
        cp MuseBar/backend/package.json deployment/backend/
        cp -r MuseBar/backend/node_modules deployment/backend/
        tar -czf musebar-deployment.tar.gz deployment/

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: musebar-deployment
        path: musebar-deployment.tar.gz

    - name: Record deployment artifact (deploy configured elsewhere)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deployment artifact 'musebar-deployment' has been uploaded."
        echo "Configure your deployment (e.g. download this artifact and deploy to your host, or use a separate deploy job with needs: build-and-deploy and actions/download-artifact) to complete production deploy."

  # Performance Testing (frontend Lighthouse; backend needs DB)
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mosehxl_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install frontend dependencies
      working-directory: MuseBar
      run: npm ci

    - name: Install backend dependencies
      working-directory: MuseBar/backend
      run: npm ci --workspaces=false --include-workspace-root=false

    - name: Build frontend
      working-directory: MuseBar
      run: npm run build

    - name: Build backend
      working-directory: MuseBar/backend
      run: npm run build

    - name: Run database migrations
      working-directory: MuseBar/backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: mosehxl_test
        JWT_SECRET: test-jwt-secret-for-ci
        NODE_ENV: test
      run: npm run migration:migrate

    - name: Start backend server
      working-directory: MuseBar/backend
      env:
        PORT: "3001"
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: mosehxl_test
        JWT_SECRET: test-jwt-secret-for-ci
        NODE_ENV: test
      run: |
        npm start &
        sleep 15

    - name: Serve frontend for Lighthouse
      run: |
        npx --yes serve -s MuseBar/build -l 3000 &
        sleep 5

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './.lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  # Documentation Generation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      working-directory: MuseBar/backend
      run: npm ci --workspaces=false --include-workspace-root=false

    - name: Generate API documentation
      working-directory: MuseBar/backend
      run: |
        npm run build
        # Generate OpenAPI documentation
        echo "📚 API documentation generated"

    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: api-documentation
        path: MuseBar/backend/src/docs/

  # Notifications
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, security-scan, build-and-deploy]
    if: always()
    
    steps:
    - name: Notify on success
      if: success()
      run: |
        echo "✅ All checks passed!"
        # Add notification logic (Slack, email, etc.)

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Some checks failed!"
        # Add notification logic (Slack, email, etc.) 